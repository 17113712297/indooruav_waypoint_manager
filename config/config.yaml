# ============================================================
#  indooruav_waypoint_manager — 可配置参数
# ============================================================

# 触发记录的最小累计位移阈值（单位：米，计算 XYZ 三维欧氏距离，含 Z 轴）
# 当机器人 XYZ 三维位移 >= delta_L_m 时，记录一个航点。
delta_L_m: 0.1

# 触发记录的最大时间间隔（单位：秒）
# 当距上一次记录时刻经过时间 >= delta_T_s 时，记录一个航点。
delta_T_s: 1.0

# 触发记录的最小偏航角（Yaw）变化阈值（单位：度）
# 当机器人偏航角相对上一次记录点变化 >= delta_A_deg 时，记录一个航点。
# 设为 0 可禁用角度触发。
delta_A_deg: 1.0

# 订阅的里程计话题名称
odom_topic: "/Odometry_global"

# 航点 JSON 文件的输出路径（含文件名）
# 支持绝对路径，也可使用 ROS 的 $(find pkg) 展开后传入。
output_path: "/home/dio/Project/Grind_One/XtDrone_Beginner/catkin_ws/src/indooruav_waypoint_manager/data/waypoints.json"
